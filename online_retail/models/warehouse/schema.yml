version: 2

models:
  - name: dim_customers
    description: "One row per customer with derived behavioral attributes"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - not_null
          - unique

      - name: country
        tests:
          - not_null

      - name: total_orders
        tests:
          - not_null

  - name: dim_products
    description: "One row per product"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - not_null
          - unique

  - name: fct_orders
    description: "Fact table at line-item grain. One row per product per invoice."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - invoice_id
            - product_id
    columns:
      - name: invoice_id
        tests:
          - not_null

      - name: customer_id
        description: "FK to dim_customers"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id
        description: "FK to dim_products"
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: line_total
        tests:
          - not_null